# ============================================================
# OpsPilot - 本地开发依赖服务
# ============================================================
# Gitea（代码托管 Forge）+ Woodpecker CI（持续集成）
# + Apprise（通知网关）+ Alertmanager（告警管理）+ Gatus（健康看板）
# ============================================================
# 使用方式：
#   docker compose up -d
#   docker compose down
#
# 服务访问：
#   Gitea:        http://localhost:3001
#   Woodpecker:   http://localhost:8000
#   Apprise:      http://localhost:8001
#   Alertmanager: http://localhost:9093
#   Gatus:        http://localhost:8080
#   MinIO:        http://localhost:9001
#   MinIO API:    http://localhost:9000
#   Caddy:        http://localhost（统一入口）
#                 配置 /etc/hosts 后使用 subdomain 访问各服务
# ============================================================

services:
  # ===== Gitea（Woodpecker 的 Forge） =====
  gitea:
    image: gitea/gitea:1.22
    container_name: opspilot-gitea
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=gitea
      - GITEA__server__DOMAIN=localhost
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__ROOT_URL=http://localhost:3001
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__service__REQUIRE_SIGNIN_VIEW=false
    volumes:
      - gitea-data:/data
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

  # ===== Woodpecker Server（CI 控制器 + API） =====
  woodpecker-server:
    image: woodpeckerci/woodpecker-server:3.0
    container_name: opspilot-woodpecker-server
    restart: unless-stopped
    environment:
      - WOODPECKER_HOST=http://localhost:8000
      - WOODPECKER_SERVER_HOST=0.0.0.0
      - WOODPECKER_SERVER_PORT=8000
      - WOODPECKER_DATABASE_TYPE=postgres
      - WOODPECKER_DATABASE_DATASOURCE=postgres://woodpecker:woodpecker@postgres:5432/woodpecker?sslmode=disable
      # Gitea Forge 配置
      - WOODPECKER_GITEA=true
      - WOODPECKER_GITEA_URL=http://gitea:3000
      - WOODPECKER_GITEA_CLIENT=${WOODPECKER_GITEA_CLIENT:-}
      - WOODPECKER_GITEA_SECRET=${WOODPECKER_GITEA_SECRET:-}
      # 管理员账号（首次启动时自动创建）
      - WOODPECKER_ADMIN_USER=opspilot
      - WOODPECKER_ADMIN_CREATE=token
      # 密钥：用于 Agent 认证和 Webhook 签名
      - WOODPECKER_AGENT_SECRET=${WOODPECKER_AGENT_SECRET:-change-me-in-production}
      - WOODPECKER_WEBHOOK_SECRET=${WOODPECKER_WEBHOOK_SECRET:-change-me-in-production}
    volumes:
      - woodpecker-server-data:/etc/woodpecker
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  # ===== Woodpecker Agent（流水线执行器） =====
  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:3.0
    container_name: opspilot-woodpecker-agent
    restart: unless-stopped
    environment:
      - WOODPECKER_SERVER=woodpecker-server:9000
      - WOODPECKER_AGENT_SECRET=${WOODPECKER_AGENT_SECRET:-change-me-in-production}
      - WOODPECKER_MAX_WORKFLOWS=2
      # Docker-in-Docker：Agent 在容器内运行 Docker 流水线步骤
      - WOODPECKER_DOCKER_CONFIG=mtls
      - DOCKER_HOST=tcp://docker-in-docker:2375
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - woodpecker-server
      - docker-in-docker

  # ===== Docker-in-Docker（Woodpecker Agent 执行环境） =====
  docker-in-docker:
    image: docker:dind
    container_name: opspilot-docker-dind
    restart: unless-stopped
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    volumes:
      - dind-data:/var/lib/docker

  # ===== Alertmanager（告警路由与静默管理） =====
  # 接收 Prometheus 告警，通过 webhook 转发到 OpsPilot
  alertmanager:
    image: prom/alertmanager:latest
    container_name: opspilot-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
      - '--cluster.listen-address='
    volumes:
      - ./scripts/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9093/api/v2/status >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===== Gatus（服务健康看板） =====
  # 自动监控所有依赖服务的健康状态
  # 官方文档：https://github.com/TwiN/gatus
  gatus:
    image: twinproduction/gatus:latest
    container_name: opspilot-gatus
    restart: unless-stopped
    volumes:
      - ./scripts/gatus/config.yaml:/config/config.yaml:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/endpoints/statuses >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===== MinIO（S3 兼容对象存储） =====
  # 用于 WAL-G 备份存储 + 其他 S3 兼容场景
  minio:
    image: minio/minio:latest
    container_name: opspilot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web 控制台
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===== WAL-G（PostgreSQL 备份 Sidecar） =====
  # 自动定时备份 PostgreSQL 到 MinIO
  wal-g:
    build:
      context: .
      dockerfile: Dockerfile.wal-g
    container_name: opspilot-wal-g
    restart: unless-stopped
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=${POSTGRES_PASSWORD:-postgres}
      - WALG_S3_PREFIX=s3://opspilot-backups/postgres
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - AWS_ENDPOINT=http://minio:9000
      - AWS_REGION=us-east-1
      - AWS_S3_FORCE_PATH_STYLE=true
      - WALG_COMPRESSION_METHOD=lz4
      - WALG_DELTA_MAX_STEPS=6
      - BACKUP_CRON=${WALG_BACKUP_CRON:-0 2 * * *}
      - WALG_RETENTION_DAYS=${WALG_RETENTION_DAYS:-30}
    volumes:
      - ./scripts/wal-g:/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  # ===== Apprise（统一通知网关） =====
  # 提供 REST API 发送通知到 130+ 服务（Slack、Telegram、Discord、邮件等）
  # API 文档：https://github.com/caronc/apprise-api
  apprise:
    image: caronc/apprise:latest
    container_name: opspilot-apprise
    restart: unless-stopped
    environment:
      - APPRISE_STATEFUL_MODE=simple
      - APPRISE_WORKER_COUNT=1
      - APPRISE_ADMIN=y
      - TZ=Asia/Shanghai
    volumes:
      - apprise-config:/config
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/status >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ===== PostgreSQL（共享数据库：Gitea + Woodpecker） =====
  postgres:
    image: postgres:16-alpine
    container_name: opspilot-ci-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
      # 以下覆盖 init-ci-dbs.sh 中的默认密码
      - GITEA_DB_PASSWORD=${GITEA_DB_PASSWORD:-gitea}
      - WOODPECKER_DB_PASSWORD=${WOODPECKER_DB_PASSWORD:-woodpecker}
      - GATUS_DB_PASSWORD=${GATUS_DB_PASSWORD:-gatus}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ci-postgres-data:/var/lib/postgresql/data
      - ./scripts/init-ci-dbs.sh:/docker-entrypoint-initdb.d/init-ci-dbs.sh:ro
    ports:
      - "5433:5432"

  # ===== Caddy（反向代理 + 自动 HTTPS） =====
  # 统一端口访问所有依赖服务
  # 使用方式：配置 /etc/hosts 后访问 http://*.localhost
  # 生产部署时替换为真实域名即可自动获取 Let's Encrypt 证书
  caddy:
    image: caddy:2.11-alpine
    container_name: opspilot-caddy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - gitea
      - woodpecker-server
      - alertmanager
      - gatus
      - apprise
      - minio

volumes:
  gitea-data:
  woodpecker-server-data:
  dind-data:
  ci-postgres-data:
  apprise-config:
  alertmanager-data:
  minio-data:
  gatus-data:
  caddy-data:
  caddy-config:
